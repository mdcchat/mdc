<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDC Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --text: #f5f5f5; --accent: #5288c1; --msg-mine: #2b5278; --msg-theirs: #182533; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; }
        .screen { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; }
        .hidden { display: none !important; }

        /* Шапка */
        .header { background: var(--panel); height: 60px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #101921; gap: 15px; flex-shrink: 0; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Список чатов */
        #content-list { flex-grow: 1; overflow-y: auto; }
        .card { padding: 15px; border-bottom: 1px solid #101921; display: flex; align-items: center; gap: 15px; cursor: pointer; }

        /* Сообщения */
        #messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0e1621; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 15px; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: var(--msg-mine); }
        .msg.theirs { align-self: flex-start; background: var(--msg-theirs); }

        /* ПОЛЕ ВВОДА - теперь оно всегда внизу */
        #input-area { background: var(--panel); padding: 10px 15px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
        #msgInput { flex-grow: 1; background: #0e1621; border: none; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; color: #fff; cursor: pointer; font-size: 20px; flex-shrink: 0; }

        /* Авторизация */
        .auth-box { width: 300px; background: var(--panel); padding: 30px; border-radius: 15px; text-align: center; margin: auto; }
        input.tg { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #101921; background: #0e1621; color: #fff; box-sizing: border-box; }
        button.tg { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen" style="justify-content: center;">
        <div class="auth-box">
            <h2>Вход в MDC</h2>
            <input type="email" id="email" class="tg" placeholder="Email">
            <input type="password" id="pass" class="tg" placeholder="Пароль">
            <button class="tg" onclick="handleAuth()">ВОЙТИ</button>
            <p id="auth-err" style="color: red; font-size: 12px; display: none;"></p>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="header">
            <div class="avatar" id="my-av">?</div>
            <div style="flex:1"><b>MDC Ultra</b></div>
        </div>
        <div id="content-list">
            </div>
    </div>

    <div id="chat-screen" class="screen hidden">
        <div class="header">
            <button onclick="location.reload()" style="background:none; border:none; color:#fff; font-size:20px;">←</button>
            <div class="avatar" id="chat-av">?</div>
            <div id="chat-title">Чат</div>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Написать сообщение...">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuc1D71KVZdyNG8ZeBnHjPPe_QFpqjr9M",
            authDomain: "mdcjsnsks.firebaseapp.com",
            projectId: "mdcjsnsks",
            storageBucket: "mdcjsnsks.firebasestorage.app",
            messagingSenderId: "389971124460",
            appId: "1:389971124460:web:417a7f1f3411a3e75dc5c9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let me = null;
        let currentChatId = "llgostaevmaksim2"; // Твой чат со скрина

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            try {
                let res;
                try {
                    res = await auth.signInWithEmailAndPassword(email, pass);
                } catch(e) {
                    res = await auth.createUserWithEmailAndPassword(email, pass);
                }
                me = { uid: res.user.uid, name: email.split('@')[0] };
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                
                // Сразу создаем карточку чата для теста
                showChatList();
            } catch(e) {
                document.getElementById('auth-err').innerText = e.message;
                document.getElementById('auth-err').style.display = 'block';
            }
        }

        function showChatList() {
            const list = document.getElementById('content-list');
            list.innerHTML = `
                <div class="card" onclick="openChat()">
                    <div class="avatar">L</div>
                    <div class="card-info">
                        <b>llgostaevmaksim2</b><br>
                        <small style="color:gray">Нажми, чтобы открыть чат</small>
                    </div>
                </div>`;
        }

        function openChat() {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-title').innerText = "llgostaevmaksim2";
            loadMessages();
        }

        function loadMessages() {
            // Читаем из твоей коллекции "глобальные_новости"
            db.collection("глобальные_новости").doc(currentChatId).collection("messages").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const d = document.createElement('div');
                    d.className = 'msg ' + (m.senderId === me.uid ? 'mine' : 'theirs');
                    d.innerText = m.text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendMessage() {
            const inp = document.getElementById('msgInput');
            const text = inp.value.trim();
            if(!text) return;
            
            try {
                // Пишем в "глобальные_новости"
                await db.collection("глобальные_новости").doc(currentChatId).collection("messages").add({
                    text: text,
                    senderId: me.uid,
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await db.collection("глобальные_новости").doc(currentChatId).set({
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    participants: firebase.firestore.FieldValue.arrayUnion(me.uid)
                }, { merge: true });

                inp.value = "";
            } catch(e) {
                alert("Ошибка! Проверь Rules в Firebase: " + e.message);
            }
        }
    </script>
</body>
</html>
