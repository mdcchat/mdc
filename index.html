<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDC Ultra Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --accent: #5288c1; --text: #fff; --border: #101921; --dev: #ff4d4d; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; overflow: hidden; }
        .screen { display: flex; flex-direction: column; height: 100%; width: 100%; position: absolute; background: var(--bg); }
        .hidden { display: none !important; }

        /* Header */
        .header { background: var(--panel); padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .search-input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 5px 10px; border-radius: 5px; width: 120px; font-size: 12px; }

        /* Messages */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 12px; max-width: 85%; position: relative; }
        .msg.mine { align-self: flex-end; background: #2b5278; }
        .msg.theirs { align-self: flex-start; background: #182533; }
        .msg.bot { align-self: center; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #aaa; font-style: italic; font-size: 13px; text-align: center; }
        
        .u-name { font-size: 11px; font-weight: bold; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .del-btn { color: #ff4d4d; cursor: pointer; margin-left: 10px; font-weight: normal; font-size: 14px; }
        
        /* Badges */
        .badge { font-size: 9px; padding: 1px 4px; border-radius: 4px; border: 1px solid; }

        /* Input */
        .input-bar { background: var(--panel); padding: 10px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input.main-in { flex: 1; background: var(--bg); border: 1px solid #242f3d; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen" style="justify-content:center; align-items:center; z-index:100;">
        <div style="background:var(--panel); padding:30px; border-radius:15px; text-align:center; width:90%; max-width:320px;">
            <h2 style="color:var(--accent)">MDC Login</h2>
            <input type="email" id="email" style="width:100%; margin-bottom:10px" placeholder="Email">
            <input type="password" id="pass" style="width:100%; margin-bottom:15px" placeholder="Пароль">
            <button onclick="handleAuth()" style="width:100%; padding:10px; background:var(--accent); border:none; color:#fff; border-radius:5px;">ВОЙТИ</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="header">
            <b>MDC GLOBAL</b>
            <input type="text" id="chat-search" class="search-input" placeholder="Поиск в чате..." oninput="filterMessages()">
            <div id="my-av" style="width:30px; height:30px; background:var(--accent); border-radius:50%; text-align:center; line-height:30px; font-weight:bold;">?</div>
        </div>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="msgInput" class="main-in" placeholder="Сообщение или команда...">
            <button onclick="process()" style="background:none; border:none; color:var(--accent); font-size:24px;">➤</button>
        </div>
    </div>

<script>
    const config = {
        apiKey: "AIzaSyBuc1D71KVZdyNG8ZeBnHjPPe_QFpqjr9M",
        authDomain: "mdcjsnsks.firebaseapp.com",
        projectId: "mdcjsnsks",
        storageBucket: "mdcjsnsks.firebasestorage.app",
        appId: "1:389971124460:web:417a7f1f3411a3e75dc5c9"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.firestore();
    let me = null, chatLocked = false, allMessages = [];

    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            const res = await auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
            location.reload();
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        if(user) db.collection("users").doc(user.uid).get().then(doc => {
            me = doc.data() || { uid: user.uid, name: user.email.split('@')[0], email: user.email, role: (user.email === "finderss42@gmail.com" ? "dev" : "user") };
            if(!doc.exists) db.collection("users").doc(me.uid).set(me);
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('my-av').innerText = me.name[0];
            load();
            listenLock();
        });
    });

    function listenLock() {
        db.collection("settings").doc("chat_config").onSnapshot(doc => { if(doc.exists) chatLocked = doc.data().locked; });
    }

    function load() {
        db.collection("глобальные_новости").doc("сообщения").collection("list")
          .orderBy("time", "asc").limitToLast(50).onSnapshot(snap => {
            allMessages = [];
            snap.forEach(doc => allMessages.push({ id: doc.id, ...doc.data() }));
            renderMessages(allMessages);
        });
    }

    function renderMessages(msgs) {
        const box = document.getElementById('messages');
        box.innerHTML = "";
        msgs.forEach(m => {
            const isBot = m.uid === "BOT";
            const div = document.createElement('div');
            div.className = 'msg ' + (isBot ? 'bot' : (m.uid === me.uid ? 'mine' : 'theirs'));
            
            let delHtml = (me.role === 'dev' || me.role === 'admin') && !isBot ? `<span class="del-btn" onclick="deleteMsg('${m.id}')">×</span>` : '';
            
            div.innerHTML = isBot ? m.text : `
                <div class="u-name" style="color:${m.role==='dev'?'#ff4d4d':'#5288c1'}">
                    <span>${m.name} ${m.role==='dev'?'<small>[DEV]</small>':''}</span>
                    ${delHtml}
                </div>
                ${m.text}`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    function filterMessages() {
        const q = document.getElementById('chat-search').value.toLowerCase();
        const filtered = allMessages.filter(m => m.text.toLowerCase().includes(q));
        renderMessages(filtered);
    }

    async function process() {
        const inp = document.getElementById('msgInput');
        const txt = inp.value.trim();
        if(!txt) return;

        // Команды
        if(txt.startsWith('/') && (me.role === 'dev' || me.role === 'admin')) {
            let botText = "";
            if(txt === '/mutechat') {
                await db.collection("settings").doc("chat_config").set({locked: true});
                botText = "🔴 Чат закрыт администратором";
            }
            if(txt === '/unmutechat') {
                await db.collection("settings").doc("chat_config").set({locked: false});
                botText = "🟢 Чат открыт";
            }
            if(botText) {
                await db.collection("глобальные_новости").doc("сообщения").collection("list").add({
                    text: botText, uid: "BOT", time: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            inp.value = ""; return;
        }

        if(chatLocked && me.role === 'user') return alert("Чат временно закрыт!");

        await db.collection("глобальные_новости").doc("сообщения").collection("list").add({
            text: txt, uid: me.uid, name: me.name, role: me.role, time: firebase.firestore.FieldValue.serverTimestamp()
        });
        inp.value = "";
    }

    async function deleteMsg(id) {
        if(confirm("Удалить сообщение?")) {
            await db.collection("глобальные_новости").doc("сообщения").collection("list").doc(id).delete();
        }
    }
</script>
</body>
</html>
