<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDC Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --bg: #0e1621; --panel: #17212b; --text: #f5f5f5; --subtext: #7f91a4;
            --accent: #5288c1; --msg-mine: #2b5278; --msg-theirs: #182533; --border: #101921; 
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .screen { display: flex; flex-direction: column; height: 100vh; width: 100%; position: absolute; background: var(--bg); }
        .hidden { display: none !important; }

        /* HEADER */
        .header { background: var(--panel); padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); gap: 15px; height: 55px; box-sizing: border-box; z-index: 10; }
        .search-area { flex: 1; background: #242f3d; border-radius: 20px; padding: 8px 15px; display: flex; align-items: center; }
        .search-area input { border: none; background: none; color: var(--text); width: 100%; outline: none; font-size: 15px; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; cursor: pointer; color: #fff; flex-shrink: 0; }

        /* СПИСОК ЧАТОВ */
        #content-list { overflow-y: auto; flex: 1; }
        .card { padding: 12px 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .card:hover { background: #202b36; }
        .card-info { flex: 1; display: flex; flex-direction: column; overflow: hidden;}
        .card-title { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .card-subtitle { color: var(--subtext); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        .fab { position: absolute; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 20;}

        /* ЧАТ */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #0e1621; }
        .msg { padding: 8px 14px; border-radius: 12px; max-width: 75%; font-size: 15px; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: var(--msg-mine); border-bottom-right-radius: 4px; }
        .msg.theirs { align-self: flex-start; background: var(--msg-theirs); border-bottom-left-radius: 4px; }
        .msg-sender { font-size: 12px; color: var(--accent); margin-bottom: 4px; font-weight: bold; }

        #input-area { padding: 10px 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        #msgInput { flex: 1; background: var(--bg); border: none; padding: 12px 15px; border-radius: 20px; color: var(--text); outline: none; }
        .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* ВХОД */
        .auth-box { width: 320px; background: var(--panel); padding: 30px 20px; border-radius: 12px; text-align: center; margin: auto; }
        .tg-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .tg-btn { width: 100%; background: var(--accent); color: #fff; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen" style="justify-content: center; align-items: center; z-index: 100;">
        <div class="auth-box">
            <h2 style="margin: 0 0 25px;">Вход в MDC</h2>
            <input type="email" id="email" class="tg-input" placeholder="Email">
            <input type="password" id="pass" class="tg-input" placeholder="Пароль">
            <button class="tg-btn" onclick="handleAuth()">ПРОДОЛЖИТЬ</button>
            <div id="auth-error" style="color: #ff5252; font-size: 13px; margin-top: 15px; display: none;"></div>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="header">
            <div class="avatar" onclick="openSettings()" id="my-av-btn">?</div>
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Поиск @username..." oninput="searchUser()">
            </div>
        </div>
        <div id="content-list"></div>
        <div class="fab" onclick="openCreateMenu()">+</div>
    </div>

    <div id="chat-screen" class="screen hidden" style="z-index: 50;">
        <div class="header" style="gap: 10px;">
            <button onclick="backToMain()" style="background:none; border:none; color:var(--text); font-size:24px;">←</button>
            <div class="avatar" id="chat-av">?</div>
            <div class="card-info">
                <div id="chat-title" class="card-title">Чат</div>
                <div id="chat-subtitle" class="card-subtitle">online</div>
            </div>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuc1D71KVZdyNG8ZeBnHjPPe_QFpqjr9M",
            authDomain: "mdcjsnsks.firebaseapp.com",
            projectId: "mdcjsnsks",
            storageBucket: "mdcjsnsks.firebasestorage.app",
            messagingSenderId: "389971124460",
            appId: "1:389971124460:web:417a7f1f3411a3e75dc5c9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let me = null;
        let currentChat = null;

        // Авторизация с автоматической регистрацией
        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            const errDiv = document.getElementById('auth-error');
            if(!email || pass.length < 6) return alert("Email и пароль (мин 6 симв)");

            try {
                let res;
                try {
                    res = await auth.signInWithEmailAndPassword(email, pass);
                } catch (e) {
                    // Если ошибка входа, пробуем создать аккаунт
                    res = await auth.createUserWithEmailAndPassword(email, pass);
                }

                const doc = await db.collection("users").doc(res.user.uid).get();
                if (doc.exists) me = doc.data();
                else {
                    me = { uid: res.user.uid, email: email, name: email.split('@')[0], username: "u" + Math.floor(Math.random()*9999) };
                    await db.collection("users").doc(me.uid).set(me);
                }
                
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('my-av-btn').textContent = me.name[0].toUpperCase();
                loadRecentChats();
            } catch(e) { errDiv.textContent = e.message; errDiv.style.display = 'block'; }
        }

        // Загрузка чатов из твоей коллекции "глобальные_новости"
        function loadRecentChats() {
            db.collection("глобальные_новости").where("participants", "array-contains", me.uid).orderBy("updatedAt", "desc").onSnapshot(snap => {
                const list = document.getElementById('content-list');
                if(document.getElementById('searchInput').value.trim() !== "") return; 
                list.innerHTML = "";
                snap.forEach(doc => {
                    const chat = doc.data(); chat.id = doc.id;
                    let title = chat.name || (chat.participantNames ? (chat.participantNames[me.uid] === chat.name1 ? chat.name2 : chat.name1) : "Чат");
                    list.innerHTML += `<div class="card" onclick='openChatWindow(${JSON.stringify(chat).replace(/'/g, "&apos;")})'>
                        <div class="avatar">${title[0].toUpperCase()}</div>
                        <div class="card-info"><div class="card-title">${title}</div><div class="card-subtitle">${chat.lastMessage || ""}</div></div>
                    </div>`;
                });
            });
        }

        async function searchUser() {
            const q = document.getElementById('searchInput').value.toLowerCase().replace('@','').trim();
            const list = document.getElementById('content-list');
            if(!q) { loadRecentChats(); return; }
            const snap = await db.collection("users").where("username", ">=", q).where("username", "<=", q + '\uf8ff').get();
            list.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data(); if(u.uid === me.uid) return;
                const tempChat = { id: [me.uid, u.uid].sort().join('_'), type: 'dm', partnerId: u.uid, title: u.name, username: u.username };
                list.innerHTML += `<div class="card" onclick='openChatWindow(${JSON.stringify(tempChat).replace(/'/g, "&apos;")})'>
                    <div class="avatar">${u.name[0].toUpperCase()}</div>
                    <div class="card-info"><div class="card-title">${u.name}</div><div class="card-subtitle">@${u.username}</div></div>
                </div>`;
            });
        }

        function openChatWindow(chatData) {
            currentChat = chatData;
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-title').textContent = currentChat.title || currentChat.name;
            document.getElementById('chat-av').textContent = document.getElementById('chat-title').textContent[0].toUpperCase();
            loadMessages(currentChat.id);
        }

        function loadMessages(chatId) {
            db.collection("глобальные_новости").doc(chatId).collection("messages").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const d = document.createElement('div');
                    d.className = 'msg ' + (m.senderId === me.uid ? 'mine' : 'theirs');
                    d.innerHTML = (m.senderId !== me.uid ? `<div class="msg-sender">${m.senderName}</div>` : "") + m.text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendMessage() {
            const inp = document.getElementById('msgInput');
            const text = inp.value.trim();
            if(!text || !currentChat) return;
            
            await db.collection("глобальные_новости").doc(currentChat.id).collection("messages").add({
                text, senderId: me.uid, senderName: me.name, time: firebase.firestore.FieldValue.serverTimestamp()
            });

            const update = { lastMessage: text, updatedAt: firebase.firestore.FieldValue.serverTimestamp(), participants: firebase.firestore.FieldValue.arrayUnion(me.uid) };
            if (currentChat.type === 'dm') {
                update.participants = firebase.firestore.FieldValue.arrayUnion(me.uid, currentChat.partnerId);
                update.name1 = me.name; update.name2 = currentChat.title;
                update.participantNames = { [me.uid]: me.name, [currentChat.partnerId]: currentChat.title };
            }
            await db.collection("глобальные_новости").doc(currentChat.id).set(update, { merge: true });
            inp.value = "";
        }

        function backToMain() { document.getElementById('chat-screen').classList.add('hidden'); document.getElementById('main-screen').classList.remove('hidden'); }
    </script>
</body>
</html>
