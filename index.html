<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Безопасный месенджер MDC</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --bg: #0b0e11; 
            --text: #e9edef; 
            --panel: #111b21; 
            --accent: #0088cc; 
            --msg-mine: #005c4b; 
            --border: #222d34; 
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .screen { display: flex; flex-direction: column; height: 100vh; width: 100%; position: absolute; background: var(--bg); }
        .hidden { display: none !important; }

        /* Шапка */
        .header { background: var(--panel); padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); gap: 10px; }
        .search-area { flex: 1; background: #202c33; border-radius: 8px; padding: 5px 12px; display: flex; }
        .search-area input { border: none; background: none; color: #fff; width: 100%; outline: none; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        /* Список */
        .card { background: var(--panel); margin: 5px 10px; padding: 15px; border-radius: 10px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .news-badge { background: var(--accent); font-size: 10px; padding: 2px 6px; border-radius: 5px; float: right; }

        /* Сообщения */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: var(--msg-mine); }
        .msg.theirs { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }

        /* Формы */
        input, button { padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; }
        button { background: var(--accent); color: #fff; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen" style="justify-content: center; align-items: center; display: flex;">
        <div style="width: 300px; background: var(--panel); padding: 20px; border-radius: 15px; text-align: center;">
            <h1 style="color: var(--accent);">MDC</h1>
            <input type="email" id="email" placeholder="Email" style="width: 100%; box-sizing: border-box;">
            <input type="password" id="pass" placeholder="Пароль" style="width: 100%; box-sizing: border-box;">
            <button onclick="handleAuth()" style="width: 100%;">ВОЙТИ / СОЗДАТЬ</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="header">
            <div class="avatar" onclick="openSettings()" id="my-av-btn">?</div>
            <div class="search-area"><input type="text" id="searchInput" placeholder="Поиск @username..." oninput="searchUser()"></div>
        </div>
        <div id="content-list" style="flex: 1; overflow-y: auto;">
            <div class="card" onclick="openNews()"><b>📢 MDC NEWS</b> <span class="news-badge">OFFICIAL</span></div>
            <div id="search-results"></div>
        </div>
    </div>

    <div id="chat-screen" class="screen hidden">
        <div class="header">
            <button onclick="backToMain()" style="background:none;">←</button>
            <b id="chat-title">Чат</b>
        </div>
        <div id="messages"></div>
        <div id="input-area" style="padding: 10px; background: var(--panel); display: flex; gap: 5px;">
            <input type="text" id="msgInput" placeholder="Сообщение..." style="flex: 1; margin: 0;">
            <button onclick="sendMessage()">➤</button>
        </div>
        <div id="read-only-msg" class="hidden" style="padding: 20px; text-align: center; opacity: 0.5;">Только админ может писать сюда.</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuc1D71KVZdyNG8ZeBnHjPPe_QFpqjr9M",
            authDomain: "mdcjsnsks.firebaseapp.com",
            projectId: "mdcjsnsks",
            storageBucket: "mdcjsnsks.firebasestorage.app",
            messagingSenderId: "389971124460",
            appId: "1:389971124460:web:417a7f1f3411a3e75dc5c9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let me = null, partner = null, isNewsMode = false;
        const ADMIN_EMAIL = "finderss42@gmail.com"; 

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Заполни поля");

            try {
                // Пытаемся войти, если не выходит — создаем
                let res = await auth.signInWithEmailAndPassword(email, pass).catch(() => auth.createUserWithEmailAndPassword(email, pass));
                
                const doc = await db.collection("users").doc(res.user.uid).get();
                me = doc.exists ? doc.data() : { uid: res.user.uid, email, name: email.split('@')[0], username: "u"+Math.floor(Math.random()*999) };
                if (!doc.exists) await db.collection("users").doc(me.uid).set(me);
                
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('my-av-btn').textContent = me.name[0].toUpperCase();
            } catch(e) { alert("Ошибка: " + e.message); }
        }

        async function searchUser() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const resDiv = document.getElementById('search-results');
            if(!q) { resDiv.innerHTML = ""; return; }
            const snap = await db.collection("users").where("username", "==", q).get();
            resDiv.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                if(u.uid === me.uid) return;
                resDiv.innerHTML += `<div class="card" onclick='openChat(${JSON.stringify(u)})'>@${u.username} (${u.name})</div>`;
            });
        }

        function openNews() {
            isNewsMode = true;
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-title').textContent = "MDC NEWS";
            const isAdmin = me.email === ADMIN_EMAIL;
            document.getElementById('input-area').classList.toggle('hidden', !isAdmin);
            document.getElementById('read-only-msg').classList.toggle('hidden', isAdmin);
            loadMessages("global_news");
        }

        function openChat(u) {
            isNewsMode = false; partner = u;
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-title').textContent = partner.name;
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('read-only-msg').classList.add('hidden');
            loadMessages([me.uid, partner.uid].sort().join('_'));
        }

        function loadMessages(chatId) {
            db.collection("chats").doc(chatId).collection("messages").orderBy("time", "asc").onSnapshot(snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    box.innerHTML += `<div class="msg ${m.sender === me.uid ? 'mine' : 'theirs'}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendMessage() {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim()) return;
            const chatId = isNewsMode ? "global_news" : [me.uid, partner.uid].sort().join('_');
            await db.collection("chats").doc(chatId).collection("messages").add({
                text: inp.value, sender: me.uid, time: firebase.firestore.FieldValue.serverTimestamp()
            });
            inp.value = "";
        }

        function backToMain() {
            document.getElementById('chat-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }
    </script>
</body>
            </html>
