<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDC Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* TELEGRAM DARK THEME */
        :root { 
            --bg: #0e1621; 
            --panel: #17212b; 
            --text: #f5f5f5; 
            --subtext: #7f91a4;
            --accent: #5288c1; 
            --msg-mine: #2b5278; 
            --msg-theirs: #182533;
            --border: #101921; 
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .screen { display: flex; flex-direction: column; height: 100vh; width: 100%; position: absolute; background: var(--bg); }
        .hidden { display: none !important; }

        /* HEADER */
        .header { background: var(--panel); padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); gap: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); z-index: 10; height: 50px; box-sizing: border-box; }
        .search-area { flex: 1; background: #242f3d; border-radius: 20px; padding: 6px 15px; display: flex; align-items: center; }
        .search-area input { border: none; background: none; color: var(--text); width: 100%; outline: none; font-size: 15px; }
        .search-area input::placeholder { color: var(--subtext); }
        
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; cursor: pointer; overflow: hidden; color: #fff; flex-shrink: 0;}
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* LISTS */
        .card { padding: 12px 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid var(--border); }
        .card:hover, .card:active { background: #202b36; }
        .news-icon { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .card-info { flex: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: 600; font-size: 16px; margin-bottom: 3px; }
        .card-subtitle { color: var(--subtext); font-size: 14px; }

        /* CHAT */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://www.transparenttextures.com/patterns/stardust.png') var(--bg); }
        .msg { padding: 8px 14px; border-radius: 12px; max-width: 75%; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg.mine { align-self: flex-end; background: var(--msg-mine); border-bottom-right-radius: 4px; }
        .msg.theirs { align-self: flex-start; background: var(--msg-theirs); border-bottom-left-radius: 4px; }

        /* INPUTS & BUTTONS */
        #input-area { padding: 10px 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        #msgInput { flex: 1; background: var(--bg); border: none; padding: 12px 15px; border-radius: 20px; color: var(--text); font-size: 15px; outline: none; }
        .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .auth-box { width: 320px; background: var(--panel); padding: 30px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        .tg-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; outline: none; transition: border-color 0.2s;}
        .tg-input:focus { border-color: var(--accent); }
        .tg-btn { width: 100%; background: var(--accent); color: #fff; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; transition: opacity 0.2s;}
        .tg-btn:active { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen" style="justify-content: center; align-items: center; z-index: 100;">
        <div class="auth-box">
            <h2 style="margin: 0 0 25px; font-weight: 600;">Вход в MDC</h2>
            <input type="email" id="email" class="tg-input" placeholder="Email (finderss42@gmail.com)">
            <input type="password" id="pass" class="tg-input" placeholder="Пароль">
            <button class="tg-btn" onclick="handleAuth()">ПРОДОЛЖИТЬ</button>
            <div id="auth-error" style="color: #ff5252; font-size: 13px; margin-top: 15px; display: none;"></div>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="header">
            <div class="avatar" onclick="openSettings()" id="my-av-btn">?</div>
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Поиск @username..." oninput="searchUser()">
            </div>
        </div>
        
        <div id="content-list" style="overflow-y: auto; flex: 1;">
            <div class="card" onclick="openNews()">
                <div class="news-icon">📢</div>
                <div class="card-info">
                    <div class="card-title" style="color: var(--accent);">MDC NEWS</div>
                    <div class="card-subtitle">Официальный канал</div>
                </div>
            </div>
            <div id="search-results"></div>
        </div>
    </div>

    <div id="chat-screen" class="screen hidden" style="z-index: 50;">
        <div class="header" style="gap: 10px;">
            <button onclick="backToMain()" style="background:none; border:none; color:var(--text); font-size:24px; cursor:pointer; padding:0 5px;">←</button>
            <div class="avatar" id="chat-av">?</div>
            <div class="card-info" style="flex:1;">
                <div class="card-title" id="chat-title" style="font-size:16px;">Чат</div>
                <div class="card-subtitle" id="chat-subtitle" style="font-size:12px;">online</div>
            </div>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Написать сообщение...">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
        <div id="read-only-msg" class="hidden" style="padding: 15px; text-align: center; color: var(--subtext); background: var(--panel); font-size: 14px;">
            Только администратор может публиковать новости.
        </div>
    </div>

    <div id="settings-screen" class="screen hidden" style="z-index: 80;">
        <div class="header">
            <button onclick="closeSettings()" style="background:none; border:none; color:var(--text); font-size:24px; cursor:pointer; padding:0 5px;">←</button>
            <div class="card-title" style="font-size:18px;">Настройки профиля</div>
        </div>
        <div style="padding: 20px; overflow-y: auto;">
            <div class="auth-box" style="width: auto; margin-bottom: 20px; text-align: left;">
                <label style="color: var(--subtext); font-size: 13px; margin-bottom: 5px; display: block;">Имя (видно всем)</label>
                <input type="text" id="set-name" class="tg-input">
                
                <label style="color: var(--subtext); font-size: 13px; margin-bottom: 5px; display: block;">Username (для поиска)</label>
                <input type="text" id="set-username" class="tg-input">
                
                <label style="color: var(--subtext); font-size: 13px; margin-bottom: 5px; display: block;">Ссылка на аватарку</label>
                <input type="text" id="set-avatar" class="tg-input">
                
                <button class="tg-btn" onclick="saveProfile()">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuc1D71KVZdyNG8ZeBnHjPPe_QFpqjr9M",
            authDomain: "mdcjsnsks.firebaseapp.com",
            projectId: "mdcjsnsks",
            storageBucket: "mdcjsnsks.firebasestorage.app",
            messagingSenderId: "389971124460",
            appId: "1:389971124460:web:417a7f1f3411a3e75dc5c9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let me = null;
        let partner = null;
        let isNewsMode = false;
        const ADMIN_EMAIL = "finderss42@gmail.com"; 

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            const errDiv = document.getElementById('auth-error');
            errDiv.style.display = 'none';

            if(!email || pass.length < 6) {
                errDiv.textContent = "Введите email и пароль (мин. 6 символов)";
                errDiv.style.display = 'block';
                return;
            }

            try {
                let res;
                try { 
                    res = await auth.signInWithEmailAndPassword(email, pass); 
                } catch (err) {
                    if (err.code === 'auth/user-not-found') {
                        res = await auth.createUserWithEmailAndPassword(email, pass);
                    } else if (err.code === 'auth/wrong-password') {
                        throw new Error("Неверный пароль.");
                    } else { throw err; }
                }

                const doc = await db.collection("users").doc(res.user.uid).get();
                if (doc.exists) {
                    me = doc.data();
                } else {
                    me = { 
                        uid: res.user.uid, 
                        email: email, 
                        name: email.split('@')[0], 
                        username: "user" + Math.floor(Math.random()*9999), 
                        avatar: ""
                    };
                    await db.collection("users").doc(me.uid).set(me);
                }
                
                updateUI();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
            } catch(e) { 
                console.error(e);
                errDiv.textContent = "Ошибка: " + e.message; 
                errDiv.style.display = 'block';
            }
        }

        async function searchUser() {
            const q = document.getElementById('searchInput').value.toLowerCase().replace('@','').trim();
            const resDiv = document.getElementById('search-results');
            if(!q) { resDiv.innerHTML = ""; return; }
            
            const snap = await db.collection("users").where("username", "==", q).get();
            resDiv.innerHTML = "";
            
            if (snap.empty) { 
                resDiv.innerHTML = "<div style='text-align:center; color:var(--subtext); padding:20px; font-size:14px;'>Не найдено</div>"; 
            }

            snap.forEach(doc => {
                const u = doc.data();
                if(u.uid === me.uid) return;
                const char = (u.name) ? u.name[0].toUpperCase() : "?";
                const avHTML = u.avatar ? `<img src="${u.avatar}">` : char;
                
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="avatar">${avHTML}</div>
                    <div class="card-info">
                        <div class="card-title">${u.name || "User"}</div>
                        <div class="card-subtitle">@${u.username}</div>
                    </div>`;
                div.onclick = () => openChat(u);
                resDiv.appendChild(div);
            });
        }

        function openNews() {
            isNewsMode = true;
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-title').textContent = "MDC NEWS";
            document.getElementById('chat-subtitle').textContent = "Официальный канал";
            document.getElementById('chat-av').innerHTML = "📢";
            document.getElementById('chat-av').style.background = "#fff";
            document.getElementById('chat-av').style.color = "#000";
            
            if (me.email === ADMIN_EMAIL) {
                document.getElementById('input-area').classList.remove('hidden');
                document.getElementById('read-only-msg').classList.add('hidden');
            } else {
                document.getElementById('input-area').classList.add('hidden');
                document.getElementById('read-only-msg').classList.remove('hidden');
            }
            loadMessages("global_news");
        }

        function openChat(u) {
            isNewsMode = false;
            partner = u;
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('chat-title').textContent = partner.name || "User";
            document.getElementById('chat-subtitle').textContent = "@" + partner.username;
            
            const char = (partner.name) ? partner.name[0].toUpperCase() : "?";
            document.getElementById('chat-av').innerHTML = partner.avatar ? `<img src="${partner.avatar}">` : char;
            document.getElementById('chat-av').style.background = "var(--accent)";
            document.getElementById('chat-av').style.color = "#fff";

            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('read-only-msg').classList.add('hidden');
            
            loadMessages([me.uid, partner.uid].sort().join('_'));
        }

        function loadMessages(chatId) {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            
            db.collection("chats").doc(chatId).collection("messages").orderBy("time", "asc").onSnapshot(snap => {
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const d = document.createElement('div');
                    d.className = 'msg ' + (m.sender === me.uid ? 'mine' : 'theirs');
                    d.textContent = m.text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendMessage() {
            const inp = document.getElementById('msgInput');
            const text = inp.value.trim();
            if(!text) return;
            
            const chatId = isNewsMode ? "global_news" : [me.uid, partner.uid].sort().join('_');
            
            await db.collection("chats").doc(chatId).collection("messages").add({
                text: text, 
                sender: me.uid, 
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            inp.value = "";
            inp.focus();
        }

        function updateUI() {
            if (!me) return;
            const char = (me.name) ? me.name[0].toUpperCase() : "?";
            document.getElementById('my-av-btn').innerHTML = me.avatar ? `<img src="${me.avatar}">` : char;
            
            document.getElementById('set-name').value = me.name || "";
            document.getElementById('set-username').value = me.username || "";
            document.getElementById('set-avatar').value = me.avatar || "";
        }

        function openSettings() {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('settings-screen').classList.remove('hidden');
            updateUI();
        }

        function closeSettings() {
            document.getElementById('settings-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        async function saveProfile() {
            const newName = document.getElementById('set-name').value.trim();
            const newUsername = document.getElementById('set-username').value.toLowerCase().replace('@','').trim();
            const newAvatar = document.getElementById('set-avatar').value.trim();
            
            if (newUsername.length < 3) return alert("Username от 3 символов.");

            me.name = newName || me.email.split('@')[0];
            me.username = newUsername;
            me.avatar = newAvatar;
            
            try {
                await db.collection("users").doc(me.uid).update(me);
                updateUI();
                closeSettings();
            } catch (e) { alert("Ошибка сохранения: " + e.message); }
        }

        function backToMain() {
            document.getElementById('chat-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('searchInput').value = "";
            document.getElementById('search-results').innerHTML = "";
        }
    </script>
</body>
</html>
