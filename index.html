<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDC TEST</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        /* Делаем всё максимально простым, чтобы нечему было ломаться */
        body { background: #0e1621; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #17212b; padding: 15px; font-weight: bold; border-bottom: 1px solid #101921; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .m { background: #182533; padding: 8px 12px; border-radius: 10px; align-self: flex-start; max-width: 80%; }
        /* Поле ввода всегда снизу */
        .input-box { background: #17212b; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #242f3d; background: #0e1621; color: white; outline: none; }
        button { background: #5288c1; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">Чат: llgostaevmaksim2</div>
    <div id="messages"></div>

    <div class="input-box">
        <input type="text" id="inp" placeholder="Пиши сюда...">
        <button onclick="send()">ОТПРАВИТЬ</button>
    </div>

<script>
    // Твои данные из Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBuc1D71KVZdyNG8ZeBnHjPPe_QFpqjr9M",
        authDomain: "mdcjsnsks.firebaseapp.com",
        projectId: "mdcjsnsks",
        storageBucket: "mdcjsnsks.firebasestorage.app",
        appId: "1:389971124460:web:417a7f1f3411a3e75dc5c9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    // Путь к сообщениям из твоего скрина базы
    const chatRef = db.collection("глобальные_новости").doc("llgostaevmaksim2").collection("сообщения");

    // Чтение сообщений в реальном времени
    chatRef.orderBy("time", "asc").onSnapshot(snap => {
        const box = document.getElementById('messages');
        box.innerHTML = "";
        snap.forEach(doc => {
            const div = document.createElement('div');
            div.className = 'm';
            div.innerText = doc.data().text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });

    // Функция отправки
    async function send() {
        const input = document.getElementById('inp');
        const text = input.value.trim();
        if(!text) return;

        try {
            await chatRef.add({
                text: text,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        } catch(e) {
            alert("Ошибка базы: " + e.message);
        }
    }
</script>

</body>
</html>
