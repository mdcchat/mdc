<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDC GLOBAL + PRIVATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --accent: #5288c1; --text: #fff; --border: #101921; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; overflow: hidden; }
        .screen { display: flex; flex-direction: column; height: 100%; width: 100%; position: absolute; background: var(--bg); }
        .hidden { display: none !important; }

        /* Header & Tabs */
        .header { background: var(--panel); height: 60px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); justify-content: space-between; flex-shrink: 0; }
        .tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 12px; color: #7f91a4; cursor: pointer; font-size: 14px; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Chat Styles */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; word-wrap: break-word; position: relative; }
        .msg.mine { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg.theirs { align-self: flex-start; background: #182533; border-bottom-left-radius: 2px; }
        .u-name { font-size: 11px; font-weight: bold; margin-bottom: 3px; }
        .dev-badge { color: #ff4d4d; border: 1px solid #ff4d4d; padding: 1px 4px; border-radius: 4px; margin-left: 5px; font-size: 9px; }

        /* User List */
        .user-card { padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .dev-av { border: 2px solid #ff4d4d; }

        /* Input */
        .input-bar { background: var(--panel); padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); align-items: center; }
        input.tg-in { flex: 1; background: var(--bg); border: 1px solid #242f3d; padding: 12px; border-radius: 20px; color: #fff; outline: none; }
        .send-btn { background: var(--accent); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

        /* Auth/Settings Boxes */
        .box { background: var(--panel); padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; margin: auto; }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen" style="justify-content: center; z-index: 100;">
        <div class="box">
            <h2>MDC Вход</h2>
            <input type="email" id="email" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Email">
            <input type="password" id="pass" style="width:100%; padding:10px;" placeholder="Пароль">
            <button class="btn" onclick="handleAuth()">ВОЙТИ</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="header">
            <b id="screen-title">MDC Global</b>
            <div class="avatar" id="my-av" onclick="showSettings()">?</div>
        </div>
        <div class="tabs">
            <div id="tab-global" class="tab active" onclick="switchTab('global')">ОБЩИЙ ЧАТ</div>
            <div id="tab-private" class="tab" onclick="switchTab('private')">ЛИЧНЫЕ</div>
        </div>
        <div id="list-area" class="list hidden" style="flex:1; overflow-y:auto;"></div>
        <div id="messages" style="flex:1;"></div>
        <div class="input-bar" id="input-zone">
            <input type="text" id="msgInput" class="tg-in" placeholder="Сообщение...">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <div id="settings-screen" class="screen hidden" style="justify-content:center; align-items:center;">
        <div class="box">
            <h3>Профиль</h3>
            <input type="text" id="new-name" style="width:100%; padding:10px;" placeholder="Ваше имя">
            <button class="btn" onclick="saveName()">СОХРАНИТЬ</button>
            <button class="btn" onclick="hideSettings()" style="background:#444">НАЗАД</button>
        </div>
    </div>

<script>
    const config = {
        apiKey: "AIzaSyBuc1D71KVZdyNG8ZeBnHjPPe_QFpqjr9M",
        authDomain: "mdcjsnsks.firebaseapp.com",
        projectId: "mdcjsnsks",
        storageBucket: "mdcjsnsks.firebasestorage.app",
        appId: "1:389971124460:web:417a7f1f3411a3e75dc5c9"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth(), db = firebase.firestore();
    let me = null, activeChatId = "GLOBAL", currentMode = "global", unsub = null;

    async function handleAuth() {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            const res = await auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
            const doc = await db.collection("users").doc(res.user.uid).get();
            me = doc.exists ? doc.data() : { uid: res.user.uid, name: e.split('@')[0], email: e, isDev: (e === "finderss42@gmail.com") };
            if(!doc.exists) await db.collection("users").doc(me.uid).set(me);
            
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('my-av').innerText = me.name[0].toUpperCase();
            if(me.isDev) document.getElementById('my-av').classList.add('dev-av');
            switchTab('global');
        } catch(err) { alert(err.message); }
    }

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('tab-global').classList.toggle('active', mode === 'global');
        document.getElementById('tab-private').classList.toggle('active', mode === 'private');
        
        const list = document.getElementById('list-area');
        const msgs = document.getElementById('messages');
        const inpt = document.getElementById('input-zone');

        if(mode === 'global') {
            list.classList.add('hidden');
            msgs.classList.remove('hidden');
            inpt.classList.remove('hidden');
            document.getElementById('screen-title').innerText = "MDC Global";
            openChat("GLOBAL");
        } else {
            list.classList.remove('hidden');
            msgs.classList.add('hidden');
            inpt.classList.add('hidden');
            document.getElementById('screen-title').innerText = "Личные сообщения";
            loadUsers();
        }
    }

    function loadUsers() {
        db.collection("users").get().then(snap => {
            const list = document.getElementById('list-area');
            list.innerHTML = "";
            snap.forEach(doc => {
                if(doc.id === me.uid) return;
                const u = doc.data();
                list.innerHTML += `
                    <div class="user-card" onclick="startPrivate('${u.uid}', '${u.name}')">
                        <div class="avatar ${u.isDev ? 'dev-av' : ''}">${u.name[0].toUpperCase()}</div>
                        <b>${u.name} ${u.isDev ? '<span class="dev-badge">Developer</span>' : ''}</b>
                    </div>`;
            });
        });
    }

    function startPrivate(tid, tname) {
        activeChatId = [me.uid, tid].sort().join('_');
        document.getElementById('list-area').classList.add('hidden');
        document.getElementById('messages').classList.remove('hidden');
        document.getElementById('input-zone').classList.remove('hidden');
        document.getElementById('screen-title').innerText = "Чат: " + tname;
        openChat(activeChatId);
    }

    function openChat(chatId) {
        if(unsub) unsub();
        const path = chatId === "GLOBAL" 
            ? db.collection("глобальные_новости").doc("сообщения").collection("list")
            : db.collection("privates").doc(chatId).collection("messages");

        unsub = path.orderBy("time", "asc").limitToLast(50).onSnapshot(snap => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isDev = d.email === "finderss42@gmail.com";
                const div = document.createElement('div');
                div.className = 'msg ' + (d.uid === me.uid ? 'mine' : 'theirs');
                div.innerHTML = `
                    <div class="u-name" style="color:${isDev ? '#ff4d4d' : 'var(--accent)'}">
                        ${d.name} ${isDev ? '<span class="dev-badge">Dev</span>' : ''}
                    </div>
                    ${d.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function send() {
        const inp = document.getElementById('msgInput');
        if(!inp.value.trim()) return;
        
        const path = activeChatId === "GLOBAL" 
            ? db.collection("глобальные_новости").doc("сообщения").collection("list")
            : db.collection("privates").doc(activeChatId).collection("messages");

        await path.add({
            text: inp.value,
            uid: me.uid,
            name: me.name,
            email: me.email,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        inp.value = "";
    }

    function showSettings() {
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('settings-screen').classList.remove('hidden');
        document.getElementById('new-name').value = me.name;
    }
    function hideSettings() {
        document.getElementById('settings-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
    }
    async function saveName() {
        me.name = document.getElementById('new-name').value;
        await db.collection("users").doc(me.uid).update({ name: me.name });
        document.getElementById('my-av').innerText = me.name[0].toUpperCase();
        hideSettings();
    }
</script>
</body>
    </html>
