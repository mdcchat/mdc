<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MDC ULTRA FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: #0e1621; color: #fff; font-family: sans-serif; height: 100%; width: 100%; overflow: hidden; }
        
        /* Главный контейнер чата */
        .chat-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }

        /* Шапка */
        .header { background: #17212b; height: 60px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #101921; flex-shrink: 0; z-index: 10; }
        .back-btn { background: none; border: none; color: #5288c1; font-size: 24px; cursor: pointer; margin-right: 15px; }

        /* Область сообщений */
        #messages { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 5px; }
        .msg.theirs { align-self: flex-start; background: #182533; border-bottom-left-radius: 5px; }

        /* ФИКСИРОВАННОЕ ПОЛЕ ВВОДА (Всегда внизу!) */
        .input-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: #17212b; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #101921; height: 70px; }
        #msgInput { flex-grow: 1; background: #0e1621; border: 1px solid #242f3d; padding: 12px 15px; border-radius: 25px; color: #fff; outline: none; font-size: 16px; }
        .send-btn { background: #5288c1; color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Экран входа */
        #auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#0e1621; z-index:100; display:flex; flex-direction:column; justify-content:center; align-items:center; padding: 20px; }
        .auth-card { background:#17212b; padding:30px; border-radius:15px; width:100%; max-width:350px; text-align:center; }
        input.field { width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #101921; background:#0e1621; color:#fff; }
        .btn-main { width:100%; padding:12px; background:#5288c1; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2>MDC ULTRA</h2>
            <input type="email" id="email" class="field" placeholder="Email (любой)">
            <input type="password" id="pass" class="field" placeholder="Пароль (любой)">
            <button class="btn-main" onclick="startApp()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="err" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="chat-screen" class="chat-container hidden">
        <div class="header">
            <button class="back-btn" onclick="location.reload()">←</button>
            <div style="font-weight: bold;">llgostaevmaksim2 (Global)</div>
        </div>

        <div id="messages">
            <div class="msg theirs">Добро пожаловать в MDC! Если здесь пусто, значит сообщений в базе еще нет. Напиши что-нибудь снизу.</div>
        </div>

        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const conf = {
            apiKey: "AIzaSyBuc1D71KVZdyNG8ZeBnHjPPe_QFpqjr9M",
            authDomain: "mdcjsnsks.firebaseapp.com",
            projectId: "mdcjsnsks",
            storageBucket: "mdcjsnsks.firebasestorage.app",
            messagingSenderId: "389971124460",
            appId: "1:389971124460:web:417a7f1f3411a3e75dc5c9"
        };

        firebase.initializeApp(conf);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let user = null;

        // Вход или Регистрация
        async function startApp() {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value;
            if(!e || p.length < 6) return alert("Введите почту и пароль от 6 знаков");

            try {
                let res;
                try {
                    res = await auth.signInWithEmailAndPassword(e, p);
                } catch(err) {
                    res = await auth.createUserWithEmailAndPassword(e, p);
                }
                user = res.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                initChat();
            } catch(err) {
                document.getElementById('err').innerText = err.message;
            }
        }

        // Слушаем сообщения из твоей коллекции "глобальные_новости"
        function initChat() {
            db.collection("глобальные_новости").doc("main_chat").collection("messages")
              .orderBy("time", "asc").limitToLast(50).onSnapshot(snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const m = document.createElement('div');
                    m.className = 'msg ' + (d.uid === user.uid ? 'mine' : 'theirs');
                    m.innerText = d.text;
                    box.appendChild(m);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // Отправка
        async function send() {
            const i = document.getElementById('msgInput');
            const txt = i.value.trim();
            if(!txt || !user) return;

            try {
                // Пишем в коллекцию "глобальные_новости"
                await db.collection("глобальные_новости").doc("main_chat").collection("messages").add({
                    text: txt,
                    uid: user.uid,
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });
                i.value = "";
            } catch(e) {
                alert("ОШИБКА: Проверь Rules в Firebase! " + e.message);
            }
        }

        // Отправка по Enter
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') send();
        });
    </script>
</body>
</html>
